name: Release

on:
  push:
    branches: [main]

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: assessment-report
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: assessment-report.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: assessment-report

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - run: rustup target add ${{ matrix.target }}

      - run: cargo build --release --target ${{ matrix.target }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: assessment-report-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.binary }}

  release:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Rename binaries
        run: |
          mv artifacts/assessment-report-x86_64-unknown-linux-gnu/assessment-report   artifacts/assessment-report-linux-x86_64
          mv artifacts/assessment-report-x86_64-pc-windows-msvc/assessment-report.exe artifacts/assessment-report-windows-x86_64.exe
          mv artifacts/assessment-report-aarch64-apple-darwin/assessment-report        artifacts/assessment-report-macos-arm64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: Build ${{ github.run_number }}
          body: "Commit: ${{ github.sha }}"
          files: |
            artifacts/assessment-report-linux-x86_64
            artifacts/assessment-report-windows-x86_64.exe
            artifacts/assessment-report-macos-arm64